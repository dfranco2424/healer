          <div style={{ ...card, display: "flex", gap: 8 }}><Stat value={cals} target={CAL_TARGET} name="Calories" color={SALMON} /><Stat value={protein} target={PROTEIN_TARGET} name="Protein g" color="#C9A23F" /></div>
          <div style={{ ...card, background: "#F1F6F3", border: "1px solid #D5E6DF" }}><div style={{ fontWeight: 700, marginBottom: 4, color: "#3E7A68" }}>📷 Snap & log</div><div style={{ fontSize: 13, color: "#5E8276", marginBottom: 10 }}>Photograph a meal (AI estimates calories) or a receipt (auto-updates your pantry).</div><div style={{ display: "flex", gap: 8 }}><button disabled style={{ flex: 1, background: "#CDE3DB", color: "#6E9488", border: "none", borderRadius: 10, padding: "12px 6px", fontSize: 13, fontWeight: 600, fontFamily: "inherit", lineHeight: 1.3 }}>🍽️ Snap meal</button><button disabled style={{ flex: 1, background: "#CDE3DB", color: "#6E9488", border: "none", borderRadius: 10, padding: "12px 6px", fontSize: 13, fontWeight: 600, fontFamily: "inherit", lineHeight: 1.3 }}>🧾 Snap receipt</button></div><div style={{ fontSize: 11.5, color: "#7DA294", marginTop: 8, fontStyle: "italic" }}>Both turn on with the AI connection (next phase).</div></div>
          <div style={card}><div style={{ fontWeight: 700, marginBottom: 8 }}>Quick add by food</div><div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 12, paddingBottom: 2 }}>{QF_CATS.map((c) => (<button key={c} onClick={() => setQfCat(c)} style={{ flexShrink: 0, background: qfCat === c ? SALMON : "#FBF1E8", color: qfCat === c ? "#fff" : "#8A7668", border: "1px solid " + (qfCat === c ? SALMON : "#EAD9C9"), borderRadius: 13, padding: "5px 10px", fontSize: 11.5, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>{c}</button>))}</div><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 7 }}>{sortedQuick.map((f) => (<button key={f.name} onClick={() => quickAdd(f)} style={{ background: "#FBF1E8", border: "1px solid #EAD9C9", borderRadius: 12, padding: "9px 6px", fontSize: 12, color: "#5A5249", cursor: "pointer", fontFamily: "inherit", textAlign: "center", lineHeight: 1.25 }}>{f.name}<div style={{ color: "#A89B8C", fontSize: 10.5, marginTop: 2 }}>+{f.cals} · {f.protein}g</div></button>))}</div>{recentAdds.length > 0 && (<div style={{ marginTop: 12, borderTop: "1px solid #F2EDE6", paddingTop: 10 }}><div style={{ fontSize: 12, color: "#C2A593", marginBottom: 6 }}>Added just now — tap × to undo:</div><div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{recentAdds.slice(-8).map((e) => (<button key={e.key} onClick={() => undoAdd(e)} style={{ background: "#FFF1E9", border: "1px solid #F6E0D3", borderRadius: 14, padding: "5px 10px", fontSize: 12, color: "#5A5249", cursor: "pointer", fontFamily: "inherit" }}>{e.name} <span style={{ color: "#C97A52", fontWeight: 700 }}>×</span></button>))}</div></div>)}</div>
          <div style={card}><div style={{ fontWeight: 700, marginBottom: 10 }}>Manual add</div><Adder label="calories" step={[100, 250, 500]} onAdd={(n) => { setCals((c) => c + n); maybeBrick(); }} color={SALMON} /><div style={{ height: 10 }} /><Adder label="protein (g)" step={[10, 20, 30]} onAdd={(n) => setProtein((p) => p + n)} color="#C9A23F" /></div>
          <button onClick={() => { setCals(0); setProtein(0); setDone({}); setRecentAdds([]); }} style={{ width: "100%", background: "#fff", border: "1px solid #EAE2D8", borderRadius: 10, padding: 10, color: "#A89B8C", fontSize: 13, fontFamily: "inherit", cursor: "pointer" }}>Reset today's food log</button>
        </>)}

        {tab === "recharge" && (() => { const content = WATCH_CONTENT(cond, goal && goal.label); const cats = Object.keys(content); const items = content[rechargeTab] || []; return (<>
          <div style={{ ...card, background: "#F1EEF7", border: "1px solid #DED5EC" }}><div style={{ fontSize: 11, letterSpacing: ".2em", textTransform: "uppercase", color: "#8475AE", marginBottom: 6 }}>For The Low Days</div><div style={{ fontSize: 15, lineHeight: 1.5, color: "#5F5080" }}>Record a message for future-you — voice or video. On a hard day, play it back.</div><div style={{ display: "flex", gap: 8, marginTop: 12 }}><label style={{ flex: 1, background: "#E0D7F0", color: "#5F5080", borderRadius: 10, padding: "11px 6px", fontSize: 13, fontWeight: 600, textAlign: "center", cursor: "pointer" }}>🎙️ Voice<input type="file" accept="audio/*" capture style={{ display: "none" }} onChange={(e) => { if (e.target.files && e.target.files[0]) showToast("Saved your voice message 💜"); }} /></label><label style={{ flex: 1, background: "#E0D7F0", color: "#5F5080", borderRadius: 10, padding: "11px 6px", fontSize: 13, fontWeight: 600, textAlign: "center", cursor: "pointer" }}>🎥 Video<input type="file" accept="video/*" capture="user" style={{ display: "none" }} onChange={(e) => { if (e.target.files && e.target.files[0]) showToast("Saved your video message 💜"); }} /></label></div></div>
          <div style={{ ...label, margin: "14px 4px 8px", textTransform: "none", letterSpacing: ".05em" }}>Watch</div>
          <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 10, paddingBottom: 2 }}>{cats.map((c) => (<button key={c} onClick={() => setRechargeTab(c)} style={{ flexShrink: 0, whiteSpace: "nowrap", background: rechargeTab === c ? SALMON : "#fff", color: rechargeTab === c ? "#fff" : "#8A7668", border: "1px solid " + (rechargeTab === c ? SALMON : "#EAE2D8"), borderRadius: 14, padding: "7px 14px", fontSize: 12.5, cursor: "pointer", fontFamily: "inherit" }}>{c}</button>))}</div>
          <div style={card}>{items.map((w) => (<button key={w.title} onClick={() => ytOpen(w.q)} style={{ display: "flex", width: "100%", textAlign: "left", alignItems: "center", gap: 12, background: "#fff", border: "1px solid #EAE2D8", borderRadius: 12, padding: "10px", marginBottom: 10, cursor: "pointer", fontFamily: "inherit" }}><div style={{ width: 64, height: 44, borderRadius: 8, background: w.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0, position: "relative" }}>{w.icon}<div style={{ position: "absolute", right: 4, bottom: 3, width: 16, height: 16, borderRadius: "50%", background: "rgba(255,255,255,.85)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#333" }}>▶</div></div><div style={{ fontSize: 14, color: "#4A4039", lineHeight: 1.35 }}>{w.title}</div></button>))}<input placeholder="Search your own…" onKeyDown={(e) => { if (e.key === "Enter" && e.target.value) ytOpen(e.target.value); }} style={{ width: "100%", boxSizing: "border-box", padding: "11px 14px", borderRadius: 10, border: "1px solid #EAE2D8", fontFamily: "inherit", fontSize: 14, color: "#5A5249", background: "#fff" }} /><div style={{ fontSize: 11.5, color: "#A89B8C", fontStyle: "italic", marginTop: 8 }}>Real video thumbnails appear when the connection is on (next phase).</div></div>
        </>); })()}

        {tab === "ask" && (<>
          <div style={{ ...card, background: "#FFF1E9", border: "1px solid #F6E0D3" }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div style={{ fontWeight: 700, fontSize: 15, color: "#B5573A" }}>💬 Ask about your food</div><button onClick={() => setTab("today")} style={{ background: "#fff", border: "1px solid #F0D5C4", borderRadius: 16, padding: "5px 11px", fontSize: 12.5, color: "#A86A4E", cursor: "pointer", fontFamily: "inherit" }}>← Back</button></div><div style={{ fontSize: 13, color: "#A86A4E", marginTop: 6, lineHeight: 1.5 }}>Can I have this brand? Is it safe for {cond.name}? Ask anything.</div></div>
          <div style={card}>{chat.length === 0 ? (<div style={{ padding: "6px 2px" }}><div style={{ fontSize: 12.5, color: "#A89B8C", marginBottom: 10 }}>Try asking:</div>{["Can I have white rice?", "Is coffee okay?", "Can I eat fried chicken?", "What about kefir?"].map((q) => (<button key={q} onClick={() => sendChat(q)} style={{ display: "block", width: "100%", textAlign: "left", background: "#FBF1E8", border: "1px solid #EAD9C9", borderRadius: 10, padding: "10px 12px", marginBottom: 8, fontSize: 13.5, color: "#5A5249", cursor: "pointer", fontFamily: "inherit" }}>{q}</button>))}</div>) : (<div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{chat.map((m, i) => (<div key={i} style={{ alignSelf: m.role === "you" ? "flex-end" : "flex-start", maxWidth: "85%", background: m.role === "you" ? SALMON : "#FBF1E8", color: m.role === "you" ? "#fff" : "#5A5249", border: m.role === "you" ? "none" : "1px solid #EAD9C9", borderRadius: 14, padding: "9px 13px", fontSize: 13.5, lineHeight: 1.45 }}>{m.text.split(/(\*\*[^*]+\*\*)/g).map((part, j) => part.startsWith("**") && part.endsWith("**") ? <b key={j}>{part.slice(2, -2)}</b> : part)}</div>))}</div>)}</div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}><button onClick={startListening} style={{ background: listening ? SALMON : "#fff", border: "1px solid " + (listening ? SALMON : "#EAE2D8"), borderRadius: 12, padding: "0 13px", cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", minHeight: 44 }} aria-label="Speak"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={listening ? "#fff" : "#C97A52"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="11" rx="3" /><path d="M5 10a7 7 0 0 0 14 0" /><line x1="12" y1="17" x2="12" y2="21" /><line x1="8" y1="21" x2="16" y2="21" /></svg></button><input value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") sendChat(); }} placeholder={listening ? "Listening… speak now" : "Ask, or tap the mic…"} style={{ flex: 1, boxSizing: "border-box", padding: "12px 14px", borderRadius: 12, border: "1px solid " + (listening ? SALMON : "#EAE2D8"), fontFamily: "inherit", fontSize: 14, color: "#5A5249", background: "#fff" }} /><button onClick={() => sendChat()} style={{ background: SALMON, color: "#fff", border: "none", borderRadius: 12, padding: "0 18px", fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Send</button></div>
          <button onClick={() => { setSpeakAloud(!speakAloud); if (speakAloud) { try { window.speechSynthesis.cancel(); } catch (e) {} } }} style={{ marginTop: 8, background: "none", border: "none", color: speakAloud ? SAGE : "#A89B8C", fontSize: 12.5, fontFamily: "inherit", cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>{speakAloud ? "🔊 Read answers aloud: ON" : "🔇 Read answers aloud: OFF"}</button>
          <div style={{ fontSize: 11.5, color: "#A89B8C", fontStyle: "italic", margin: "10px 2px" }}>Powered by Claude AI. Soon it'll factor in your uploaded labs too.</div>
        </>)}
      </div>

      {tab !== "ask" && (<button onClick={() => setTab("ask")} style={{ position: "fixed", bottom: 84, right: "max(16px, calc(50% - 220px + 16px))", zIndex: 50, background: SALMON, color: "#fff", border: "none", borderRadius: 28, height: 52, padding: "0 18px", display: "flex", alignItems: "center", gap: 8, fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: "pointer", boxShadow: "0 4px 14px rgba(200,120,80,.4)" }}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8 8.38 8.38 0 0 1 8.5-8.5 8.38 8.38 0 0 1 8.5 8.5z" /></svg>Ask</button>)}

      <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 440, display: "flex", justifyContent: "space-around", alignItems: "center", background: "rgba(255,255,255,.96)", borderTop: "1px solid #EFEAE3", backdropFilter: "blur(8px)", padding: "7px 4px 9px" }}>
        {[["meals", "Meals", "🍽️"], ["pantry", "Pantry", "🛒"], ["today", "Today", "☀️"], ["track", "Track", "📈"], ["recharge", "Recharge", "🔋"]].map(([id, lbl, icon]) => { const active = tab === id; return (<button key={id} onClick={() => setTab(id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "3px 0" }}><div style={{ fontSize: 17, opacity: active ? 1 : .45, transform: active ? "scale(1.05)" : "none", transition: "all .15s" }}>{icon}</div><div style={{ fontSize: 10, fontWeight: active ? 700 : 400, color: active ? "#C97A52" : "#BBA897" }}>{lbl}</div><div style={{ width: active ? 16 : 0, height: 2.5, borderRadius: 2, background: SALMON, marginTop: 1, transition: "width .2s" }} /></button>); })}
      </nav>
    </div>
  );
}

function toMin(t) { const [hm, ap] = t.split(" "); let [h, m] = hm.split(":").map(Number); if (ap === "PM" && h !== 12) h += 12; if (ap === "AM" && h === 12) h = 0; return h * 60 + m; }
function Adder({ label, step, onAdd, color }) { return (<div><div style={{ fontSize: 13, color: "#8A7668", marginBottom: 6 }}>Add {label}</div><div style={{ display: "flex", gap: 8 }}>{step.map((n) => <button key={n} onClick={() => onAdd(n)} style={{ flex: 1, background: color, color: "#fff", border: "none", borderRadius: 10, padding: "10px 0", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{"+" + n}</button>)}</div></div>); }

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script></body></html>
